# ctun configuration — see DESIGN.md for the full schema.
# Edited via: ctun config

defaults:
  control_persist: "12h"           # master lifetime; "yes" = until reboot/logout
  server_alive_interval: 60        # keepalive seconds, fights idle disconnects
  terminal: auto                   # login --interactive popup: auto|gnome-terminal|xfce4-terminal|zenity

agent:
  preamble: |
    You operate on shared academic HPC clusters via `ctun`. Respect the stated
    restrictions and read `ctun -t <cluster> info` before submitting jobs.

clusters:

  # HOREKA @ KIT
  # ===============================
  # HoreKa — KIT's NHR (national tier-2) supercomputer. CPU + GPU nodes;
  # GPU jobs go to the 'accelerated' partition, CPU-only work to 'cpuonly'.
  # Login requires a one-time password (OTP).
  # ===============================
  # horeka:
  #   host: horeka.scc.kit.edu
  #   user: ab1234
  #   ssh_alias: horeka              # optional: reuse a ~/.ssh/config Host block
  #   requires_otp: true             # advisory: surfaced via `ctun info`
  #   control_persist: "24h"
  #   description: |
  #     HoreKa @ KIT (NHR). GPU jobs -> partition 'accelerated'.
  #   restrictions:                  # advisory only; surfaced via `ctun info`
  #     max_job_runtime: "48:00:00"
  #     allowed_partitions: [accelerated, cpuonly]
  #   budget:                        # omit to run unguarded
  #     script: budget/horeka.sh     # prints job-hours used since the session started
  #     session_limit: 500
  #     unit: jobh                   # job-hours (Slurm job wall-clock; concurrent jobs add up)
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

  # HAICORE @ KIT
  # ===============================
  # HAICORE — Helmholtz AI COmpute REsources @ KIT (NHR): a GPU cluster for
  # AI / machine-learning workloads. Login requires a one-time password (OTP).
  # ===============================
  # haicore:
  #   host: haicore.scc.kit.edu
  #   user: ab1234
  #   requires_otp: true
  #   budget:                        # omit / leave session_limit unset to run unguarded
  #     script: budget/haicore.sh    # bundled; job wall-clock hours since session start
  #     session_limit: 200           # max job-hours per session (or pass `ctun login -l N`)
  #     unit: jobh
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

  # KCIST @ KIT
  # ===============================
  # KCIST — a KIT NVIDIA DeepOps Slurm GPU cluster (login2.kcist.kit.edu).
  # No OTP required; GPU nodes scheduled via Slurm, no enforced usage quotas.
  # ===============================
  # kcist:
  #   host: login2.kcist.kit.edu
  #   user: ab1234
  #   requires_otp: false
  #   budget:                        # omit / leave session_limit unset to run unguarded
  #     script: budget/kcist.sh      # bundled; job wall-clock hours since session start
  #     session_limit: 100           # max job-hours per session (or pass `ctun login -l N`)
  #     unit: jobh
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

  # INT-NANO @ KIT
  # ===============================
  # int-nano — KIT Institute of Nanotechnology (INT) Slurm cluster. No OTP
  # required. Set the real login host before use, and verify `sacct` reports
  # Start/End for the budget probe.
  # ===============================
  # intnano:
  #   host: intnano.example          # set the real login host
  #   user: ab1234
  #   requires_otp: false
  #   budget:                        # omit / leave session_limit unset to run unguarded
  #     script: budget/intnano.sh    # bundled; job wall-clock hours since session start
  #     session_limit: 200           # max job-hours per session (or pass `ctun login -l N`)
  #     unit: jobh
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

  # BWUNICLUSTER 3.0 @ KIT / bwHPC
  # ===============================
  # bwUniCluster 3.0 (uc3) — Baden-Württemberg bwHPC general-purpose cluster,
  # operated at KIT. The login host uc3.scc.kit.edu is load-balanced over the
  # login nodes and requires 2FA. KIT users prefix their username with 'ka_'.
  # ===============================
  # bwuni3:
  #   host: uc3.scc.kit.edu
  #   user: ka_ab1234                # KIT users: 'ka_' prefix + local username
  #   requires_otp: true             # 2FA: service password + OTP
  #   description: |
  #     bwUniCluster 3.0 (uc3) @ KIT/bwHPC — general-purpose state cluster.
  #   budget:                        # omit / leave session_limit unset to run unguarded
  #     script: budget/bwuni3.sh     # bundled; job wall-clock hours since session start
  #     session_limit: 200           # max job-hours per session (or pass `ctun login -l N`)
  #     unit: jobh
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

webui:
  host: 127.0.0.1
  port: 8765
  open_browser: true
