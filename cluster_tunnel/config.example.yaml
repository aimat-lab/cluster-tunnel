# ctun configuration — see DESIGN.md for the full schema.
# Edited via: ctun config

defaults:
  control_persist: "12h"           # master lifetime; "yes" = until reboot/logout
  server_alive_interval: 60        # keepalive seconds, fights idle disconnects
  terminal: auto                   # login --interactive popup: auto|gnome-terminal|xfce4-terminal|zenity

agent:
  preamble: |
    You operate on shared academic HPC clusters via `ctun`. Respect the stated
    restrictions and read `ctun -t <cluster> info` before submitting jobs.

clusters:

  # Example KIT cluster with a session budget guard (uncomment & adjust):
  # horeka:
  #   host: horeka.scc.kit.edu
  #   user: ab1234
  #   ssh_alias: horeka              # optional: reuse a ~/.ssh/config Host block
  #   requires_otp: true             # advisory: surfaced via `ctun info`
  #   control_persist: "24h"
  #   description: |
  #     HoreKa @ KIT (NHR). GPU jobs -> partition 'accelerated'.
  #   restrictions:                  # advisory only; surfaced via `ctun info`
  #     max_job_runtime: "48:00:00"
  #     allowed_partitions: [accelerated, cpuonly]
  #   budget:                        # omit to run unguarded
  #     script: budget/horeka.sh     # prints job-hours used since the session started
  #     session_limit: 500
  #     unit: jobh                   # job-hours (Slurm job wall-clock; concurrent jobs add up)
  #     guard_commands: [sbatch, srun, salloc]
  #     fail_mode: closed

  # HAICORE @ KIT (NHR) — GPU cluster. The bundled budget/haicore.sh (copied here
  # by `ctun config --init`) reports session job-hours: the Slurm job wall-clock
  # time the user has run since the session started (concurrent jobs add up).
  # haicore:
  #   host: haicore.scc.kit.edu
  #   user: ab1234
  #   requires_otp: true
  #   budget:                        # omit / leave session_limit unset to run unguarded
  #     script: budget/haicore.sh    # bundled; job wall-clock hours since session start
  #     session_limit: 200           # max job-hours per session (or pass `ctun login -l N`)
  #     unit: jobh
  #     guard_commands: [sbatch, srun, salloc, aslurm, aslurmx]
  #     fail_mode: closed

webui:
  host: 127.0.0.1
  port: 8765
  open_browser: true
